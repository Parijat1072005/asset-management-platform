services:
  # 1. MongoDB Database Service
  mongo:
    image: mongo:latest
    container_name: assetiq_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - mern_network

  # 2. Node.js Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: assetiq_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      # Connects directly to the 'mongo' service name above
      - MONGO_URI=mongodb://mongo:27017/assetiq
      - JWT_SECRET=super_secret_development_key
    volumes:
      # Syncs local code to container for live-reloading
      - ./backend:/app
      # Named volume protects container's Linux node_modules from being
      # overwritten by the Windows host bind mount above
      - backend_node_modules:/app/node_modules
    depends_on:
      - mongo
    networks:
      - mern_network

  # 3. React/Vite Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: assetiq_frontend
    ports:
      - "5173:5173"
    volumes:
      # Syncs local UI code to container for live-reloading
      - ./frontend:/app
      # Named volume protects container's Linux node_modules from being
      # overwritten by the Windows host bind mount above
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - mern_network

# Define persistent volumes
volumes:
  mongo-data:
  # Named node_modules volumes — isolated per service, always Linux-native
  backend_node_modules:
  frontend_node_modules:

# Define an internal network so the containers can talk to each other
networks:
  mern_network:
    driver: bridge