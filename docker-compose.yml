services:
  # 1. Node.js Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: assetiq_backend
    ports:
      - "5000:5000"
    env_file:
      # Reads PORT, MONGO_URI (Atlas), and JWT_SECRET from backend/.env
      - ./backend/.env
    volumes:
      # Syncs local code to container for live-reloading
      - ./backend:/app
      # Named volume protects container's Linux node_modules from being
      # overwritten by the Windows host bind mount above
      - backend_node_modules:/app/node_modules
    networks:
      - mern_network

  # 2. React/Vite Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: assetiq_frontend
    ports:
      - "5173:5173"
    environment:
      # Tells the Vite proxy where to forward /api/* requests inside Docker
      - VITE_API_TARGET=http://backend:5000
    volumes:
      # Syncs local UI code to container for live-reloading
      - ./frontend:/app
      # Named volume protects container's Linux node_modules from being
      # overwritten by the Windows host bind mount above
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - mern_network

# Define persistent volumes
volumes:
  # Named node_modules volumes — isolated per service, always Linux-native
  backend_node_modules:
  frontend_node_modules:

# Define an internal network so the containers can talk to each other
networks:
  mern_network:
    driver: bridge